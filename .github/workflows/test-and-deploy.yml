name: test-check

on:
  push:
    branches:
      - source

jobs:
  build:
    runs-on: ubuntu-latest 

    permissions:
      contents: write 

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # cache: 'npm' 
      - name: Install dependencies
        run: npm ci 


      - name: Run tests
        run: node tests/index.test.js 
      
      - name: Deploy clean template to main branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          rm -f src/index.js
          
          git checkout -B main
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update template from source [skip ci]"
            git push origin main --force
          else
            echo "Никаких изменений для отправки в main нет."
          fi